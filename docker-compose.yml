version: '3.8'

services:
  # MySQL 主数据库
  mysql:
    image: mysql:8.4
    container_name: opc-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: agent-system
      MYSQL_USER: agent-system
      MYSQL_PASSWORD: change-me
      MYSQL_ROOT_PASSWORD: change-me-root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opc-network

  # Redis 8.0.5 缓存
  redis:
    image: redis:8.0.5-alpine
    container_name: opc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "change-me"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "change-me", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - opc-network

  # phpMyAdmin 管理面板
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: opc-phpmyadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    volumes:
      - /sessions
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opc-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  opc-network:
    driver: bridge
