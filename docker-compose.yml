version: '3.8'

services:
  # PostgreSQL 16 数据库
  postgres:
    image: postgres:16-alpine
    container_name: opc-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: opc_user
      POSTGRES_PASSWORD: opc_pass
      POSTGRES_DB: opc_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opc_user -d opc_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opc-network

  # Redis 7 缓存
  redis:
    image: redis:7-alpine
    container_name: opc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - opc-network

  # pgAdmin 管理面板
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: opc-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@opc.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/misc/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - opc-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  opc-network:
    driver: bridge
